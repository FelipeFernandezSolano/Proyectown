spring.application.name=importsmart-backend
spring.config.import=optional:file:./application-local.properties

# ============================================================================
#  Base de datos: MySQL (local)
#  El esquema y los datos se crean ejecutando database/importsmart_schema.sql
#  (ver README). Hibernate actualiza columnas nuevas sin borrar datos existentes.
#  Para no subir secretos a Git, coloca tu usuario/contraseña en backend/application-local.properties
#  o usa variables de entorno DB_URL, DB_USERNAME y DB_PASSWORD.
# ============================================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/importsmart?useSSL=false&serverTimezone=America/Costa_Rica&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci}
spring.datasource.username=${DB_USERNAME:importsmart}
spring.datasource.password=${DB_PASSWORD:importsmart123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- CORS / frontend ----
app.cors.allowed-origins=http://localhost:5173

# ---- JWT ----
app.jwt.secret=CAMBIAR_ESTE_SECRETO_POR_UNO_LARGO_Y_UNICO_DE_AL_MENOS_32_CARACTERES
app.jwt.expiration-ms=43200000

# ---- Google Sign-In (registro/login con Google, flujo de redireccion + callback) ----
# Client ID y Client Secret de OAuth 2.0 (Google Cloud Console > Credenciales).
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.google.client-secret=${GOOGLE_CLIENT_SECRET:}
# URI de redireccionamiento: debe coincidir EXACTO con el registrado en Google Cloud Console.
# En produccion, cambiar via la variable de entorno GOOGLE_REDIRECT_URI al dominio real
# (ej. https://tusistema.com/api/auth/google/callback).
app.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}

# ---- URL del frontend (usada para construir el enlace de "olvide mi contraseña") ----
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# ---- Correo (SMTP) para "olvide mi contraseña" ----
# Ejemplo con Gmail: MAIL_USERNAME=tu_correo@gmail.com, MAIL_PASSWORD=una App Password de 16 caracteres
# (Cuenta de Google > Seguridad > Verificacion en 2 pasos > Contraseñas de aplicaciones).
# Si no se configuran, el enlace de recuperacion se registra en el log del servidor en vez de enviarse.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---- Reglas de calculo de importaciones (RF-06/RF-07) ----
# Peso volumetrico (kg) = (largo * ancho * alto en cm) / divisor-volumetrico
app.envio.divisor-volumetrico=5000
# Costo de envio = peso facturable (mayor entre real y volumetrico) x tarifa por kg de la
# modalidad (tabla tarifas_envio / GET /api/tarifas), igual para aereo y maritimo.
# Semaforo de rentabilidad segun el margen (%)
app.rentabilidad.umbral-rentable=25
app.rentabilidad.umbral-poco=12

# ---- API externa de tipo de cambio (RF-09) ----
# open.er-api.com es gratuita y sin API key. Devuelve rates.CRC (colones por dolar).
app.tipocambio.url=https://open.er-api.com/v6/latest/USD
app.tipocambio.base-url=https://open.er-api.com/v6/latest
app.tipocambio.fallback=512.35

# ---- Chatbot publico del landing (Google Gemini - API externa gratuita) ----
# API key gratuita en https://aistudio.google.com/apikey
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.modelo=${GEMINI_MODEL:gemini-flash-lite-latest}
app.whatsapp.numero=50670103860

server.port=${PORT:8080}

logging.level.org.springframework.security=INFO
